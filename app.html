document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:['INGRESO: elige categoría, concepto y persona, y reparte el dinero entre cuentas (ej: 1250 al banco y 200 a la tarjeta de comida). Usa \"+ añadir destino\" para más de una cuenta.','GASTO: elige categoría, concepto y persona, indica desde qué cuenta o tarjeta pagas y escribe el monto. Si es un pago de deuda, elige qué deuda reduces.','TRANSFERENCIA: mueve dinero entre cuentas, paga una deuda/tarjeta, cobra una cuenta por cobrar, o elige \"Endeudarse:\" para sacar dinero de una tarjeta/préstamo hacia tus cuentas (sube la deuda y sube tu disponible).','Pon la fecha (puedes registrar movimientos pasados) y una descripción opcional — se ve en la columna Descripción del historial. Pulsa Registrar.'] },\n      { icon:'📜', color:'#a78bfa', title:'Historial: filtros y edición', intro:'A la derecha en Movimientos está tu historial completo, con filtros tipo Excel en cada columna.', steps:['Pulsa el título de cualquier columna (Fecha, Tipo, Categoría, Concepto, Cuenta, Persona) para abrir su filtro: marca o desmarca valores, o usa \"Marcar todos\" / \"Desmarcar todos\".','El botón \"Mostrar todo\" limpia todos los filtros de una vez; el botón Σ suma los movimientos visibles.','El buscador filtra por cualquier texto (descripción, categoría, monto…).','Pulsa el lápiz ✎ para editar un movimiento o la × para eliminarlo. Saldos y gráficos se recalculan al instante.'] },\n      { icon:'📊', color:'#22d3ee', title:'Presupuesto', intro:'Planifica por mes y persona, y compara lo planeado con lo real.', steps:['Elige mes/año y persona arriba. Con el lápiz ✎ de cada rúbrica asignas o cambias el valor presupuestado de ese mes en adelante; con \"+ Asignar\" activas una rúbrica oculta.','Cada rúbrica muestra Planeado, Real y Diferencia (lo que te queda de lo planeado, o el exceso en rojo). Ordena las rúbricas a tu gusto con las flechas ▲▼.','Botón \"Replicar al mes siguiente ▸\": copia todos los valores presupuestados del mes actual al mes siguiente y te lleva a él. Ajusta lo que cambie y vuelve a replicar cuando quieras. Los cambios de un mes NO se propagan solos.','\"Disponible después de gastos presupuestados\": tu dinero real menos lo presupuestado que aún falta por gastar del mes filtrado, a corto, mediano y largo plazo.','El gráfico de barras final compara real vs presupuestado por categoría; ábrelo para ver el detalle por rúbrica. Su filtro de período arranca en el rango de tus movimientos.'] },\n      { icon:'🏦', color:'#fb7185', title:'Patrimonio', intro:'Tu dinero, tus cuentas por cobrar, tus pasivos y tu patrimonio neto.', steps:['Disponible: escribe a mano el saldo de cada cuenta. Usa el check ✓ gris del CheckList junto al saldo para marcar que ya lo validaste contra el banco — se desmarcan todos al abrir la app.','Cuentas por cobrar y Pasivos: también tienen su check de validación. Edita saldos, plazos (corto/mediano/largo) y etiquetas.','Patrimonio neto: disponible + por cobrar − pasivos, en los 3 horizontes. Abajo, la evolución en el tiempo; sus filtros de período arrancan en el rango de tus movimientos.'] },\n      { icon:'⚙️', color:'#fbbf24', title:'Configuración, usuarios y respaldo', intro:'Personaliza la app, gestiona el acceso y protege tus datos.', steps:['Temas: varios claros y oscuros, incluidos Cristal Aurora y Cristal Noche (estilo vidrio). Idioma y moneda.','Categorías y conceptos: renómbralos o agrega nuevos con total seguridad; evita eliminar conceptos con registros históricos.','Usuarios: el primero es Administrador. Los nuevos registros quedan pendientes hasta que el admin los acepte o deniegue desde el aviso 🔔 que le aparece al entrar.','Copia de seguridad: Exportar guarda TODO (registros, cuentas, colores, personas, presupuestos de todos los meses, filtros). Importar lo restaura al 100% en cualquier PC.','Exportar Excel: te pregunta el rango de meses y genera 3 hojas — Registros, Cuentas y Presupuesto (real vs presupuestado por rúbrica y por mes), con números listos para fórmulas.'] }\n    ],\n    pt:[\n      { icon:'🧭', color:'#38bdf8', title:'Começar e navegar', intro:'A barra lateral esquerda tem os 6 módulos. No telemóvel abre-a com o botão ☰ no canto superior esquerdo.', steps:['Resumo: a tua fotografia financeira do mês com indicadores e gráficos.','Toca em qualquer módulo para entrar. O botão \"+ Registar\" leva-te direto a adicionar um movimento.','Muda o idioma (ES/PT/EN) em baixo na barra lateral ou em Configuração.'] },\n      { icon:'➕', color:'#34d399', title:'Registar um movimento', intro:'Vai a Movimentos. Em cima escolhe o tipo: Receita, Despesa ou Transferência. As listas estão por ordem alfabética.', steps:['RECEITA: escolhe categoria, conceito e pessoa, e reparte o dinheiro entre contas (ex: 1250 ao banco e 200 ao cartão refeição). Usa \"+ adicionar destino\" para mais de uma conta.','DESPESA: escolhe categoria, conceito e pessoa, indica de que conta ou cartão pagas e escreve o valor. Se for pagamento de dívida, escolhe que dívida reduzes.','TRANSFERÊNCIA: move dinheiro entre contas, paga uma dívida/cartão, cobra uma conta a receber, ou escolhe \"Endividar-se:\" para tirar dinheiro de um cartão/empréstimo para as tuas contas (sobe a dívida e sobe o disponível).','Coloca a data (podes registar movimentos passados) e uma descrição opcional — aparece na coluna Descrição do histórico. Carrega em Registar.'] },\n      { icon:'📜', color:'#a78bfa', title:'Histórico: filtros e edição', intro:'À direita em Movimentos está o teu histórico completo, com filtros tipo Excel em cada coluna.', steps:['Carrega no título de qualquer coluna (Data, Tipo, Categoria, Conceito, Conta, Pessoa) para abrir o seu filtro: marca ou desmarca valores, ou usa \"Marcar todos\" / \"Desmarcar todos\".','O botão \"Mostrar tudo\" limpa todos os filtros de uma vez; o botão Σ soma os movimentos visíveis.','A pesquisa filtra por qualquer texto (descrição, categoria, valor…).','Carrega no lápis ✎ para editar um movimento ou no × para eliminar. Saldos e gráficos recalculam-se na hora.'] },\n      { icon:'📊', color:'#22d3ee', title:'Orçamento', intro:'Planeia por mês e pessoa, e compara o planeado com o real.', steps:['Escolhe mês/ano e pessoa em cima. Com o lápis ✎ de cada rubrica atribuis ou alteras o valor orçamentado desse mês em diante; com \"+ Atribuir\" ativas uma rubrica oculta.','Cada rubrica mostra Planeado, Real e Diferença (o que te resta do planeado, ou o excesso a vermelho). Ordena as rubricas com as setas ▲▼.','Botão \"Replicar para o mês seguinte ▸\": copia todos os valores orçamentados do mês atual para o seguinte e leva-te até ele. Ajusta o que mudar e replica de novo quando quiseres. As alterações de um mês NÃO se propagam sozinhas.','\"Disponível após gastos orçamentados\": o teu dinheiro real menos o orçamentado que ainda falta gastar do mês filtrado, a curto, médio e longo prazo.','O gráfico de barras final compara real vs orçamentado por categoria; abre-o para ver o detalhe por rubrica. O seu filtro de período começa no intervalo dos teus movimentos.'] },\n      { icon:'🏦', color:'#fb7185', title:'Património', intro:'O teu dinheiro, as contas a receber, os passivos e o património líquido.', steps:['Disponível: escreve à mão o saldo de cada conta. Usa o visto ✓ cinzento junto ao saldo para marcar que já o validaste com o banco — desmarcam-se todos ao abrir a app.','Contas a receber e Passivos: também têm o seu visto de validação. Edita saldos, prazos (curto/médio/longo) e etiquetas.','Património líquido: disponível + a receber − passivos, nos 3 horizontes. Em baixo, a evolução no tempo; os filtros de período começam no intervalo dos teus movimentos.'] },\n      { icon:'⚙️', color:'#fbbf24', title:'Configuração, utilizadores e backup', intro:'Personaliza a app, gere o acesso e protege os teus dados.', steps:['Temas: vários claros e escuros, incluindo Cristal Aurora e Cristal Noite (estilo vidro). Idioma e moeda.','Categorias e conceitos: renomeia ou adiciona novos com segurança; evita eliminar conceitos com registos históricos.','Utilizadores: o primeiro é Administrador. Os novos registos ficam pendentes até o admin aceitar ou negar no aviso 🔔 que lhe aparece ao entrar.','Cópia de segurança: Exportar guarda TUDO (registos, contas, cores, pessoas, orçamentos de todos os meses, filtros). Importar restaura tudo a 100% em qualquer PC.','Exportar Excel: pergunta o intervalo de meses e gera 3 folhas — Registos, Contas e Orçamento (real vs orçamentado por rubrica e por mês), com números prontos para fórmulas.'] }\n    ],\n    en:[\n      { icon:'🧭', color:'#38bdf8', title:'Get started & navigate', intro:'The left sidebar holds the 6 modules. On mobile open it with the ☰ button at the top left.', steps:['Overview: your financial snapshot of the month with KPIs and charts.','Tap any module to enter. The \"+ Add\" button at the top takes you straight to logging a movement.','Switch language (ES/PT/EN) at the bottom of the sidebar or in Settings.'] },\n      { icon:'➕', color:'#34d399', title:'Log a movement', intro:'Go to Transactions. At the top pick the type: Income, Expense or Transfer. Dropdowns are sorted alphabetically.', steps:['INCOME: pick category, concept and person, and split the money across accounts (e.g. 1250 to the bank, 200 to the food card). Use \"+ add destination\" for more than one account.','EXPENSE: pick category, concept and person, choose which account or card you pay from and enter the amount. If it is a debt payment, pick which debt it reduces.','TRANSFER: move money between accounts, pay a debt/card, collect a receivable, or choose \"Borrow:\" to pull money from a card/loan into your accounts (debt goes up, available goes up).','Set the date (you can log past movements) and an optional description — it shows in the Description column of the history. Press Add.'] },\n      { icon:'📜', color:'#a78bfa', title:'History: filters & editing', intro:'On the right in Transactions is your full history, with Excel-style filters on every column.', steps:['Click any column title (Date, Type, Category, Concept, Account, Person) to open its filter: check or uncheck values, or use \"Check all\" / \"Uncheck all\".','The \"Show all\" button clears every filter at once; the Σ button sums the visible movements.','The search box filters by any text (description, category, amount…).','Tap the pencil ✎ to edit a movement or the × to delete it. Balances and charts recalculate instantly.'] },\n      { icon:'📊', color:'#22d3ee', title:'Budget', intro:'Plan by month and person, and compare planned vs actual.', steps:['Pick month/year and person at the top. Use the pencil ✎ on each item to set or change its budgeted value from that month onward; use \"+ Assign\" to activate a hidden item.','Each item shows Planned, Actual and Difference (what remains of the plan, or the excess in red). Reorder items with the ▲▼ arrows.','\"Replicate to next month ▸\" button: copies all budgeted values of the current month to the next one and takes you there. Adjust what changes and replicate again whenever you want. Changes in one month do NOT propagate on their own.','\"Available after budgeted expenses\": your real money minus the budget still left to spend for the filtered month, across short, medium and long term.','The final bar chart compares actual vs budget by category; expand it to see the per-item detail. Its period filter starts at the range of your movements.'] },\n      { icon:'🏦', color:'#fb7185', title:'Wealth', intro:'Your money, receivables, liabilities and net worth.', steps:['Available: type each account balance by hand. Use the grey ✓ check next to the balance to mark it as validated against the bank — all checks reset when the app opens.','Receivables and Liabilities: they have the same validation check. Edit balances, terms (short/medium/long) and labels.','Net worth: available + receivables − liabilities across the 3 horizons. Below, the evolution over time; its period filters start at the range of your movements.'] },\n      { icon:'⚙️', color:'#fbbf24', title:'Settings, users & backup', intro:'Personalize the app, manage access and protect your data.', steps:['Themes: several light and dark ones, including Aurora Glass and Night Glass. Language and currency.','Categories and concepts: rename or add new ones safely; avoid deleting concepts that have historical records.','Users: the first one is the Administrator. New registrations stay pending until the admin approves or denies them from the 🔔 notice shown on entry.','Backup: Export saves EVERYTHING (records, accounts, colors, people, budgets for every month, filters). Import restores it 100% on any PC.','Export Excel: it asks for the month range and builds 3 sheets — Records, Accounts and Budget (actual vs budget per item per month), with numbers ready for formulas.'] }\n    ]\n  }; return G[this.state.lang]||G.es; }\n  setLang(l){ this.save('finz_lang_v1',l); this.setState({lang:l}); this.applyDocLang(l); }\n  applyDocLang(l){ try{ document.documentElement.lang=(l==='es'?'es-ES':l==='pt'?'pt-PT':'en-GB'); }catch(e){} }\n  startColResize(key,e){ e.preventDefault(); e.stopPropagation(); const startX=e.clientX; const startW=(this.state.colW&&this.state.colW[key])||150; const min={cat:80,con:90,acc:80}[key]||80;\n    const move=ev=>{ const w=Math.max(min, Math.min(640, startW+(ev.clientX-startX))); this.setState({colW:{...this.state.colW,[key]:w}}); };\n    const up=()=>{ window.removeEventListener('pointermove',move); window.removeEventListener('pointerup',up); this.save2('finz_colw_v1',this.state.colW); };\n    window.addEventListener('pointermove',move); window.addEventListener('pointerup',up); }\n  setTheme(t){ this.save('finz_theme_v1',t); this.save('finz_accent_v1',null); this.save('finz_accentlite_v1',0); this.save('finz_accentgrad_v1',0.26); this.save('finz_accenttx_v1',null); this.save('finz_accenttxlite_v1',0); this.setState({theme:t,accent:null,accentLite:0,accentGrad:0.26,accentTx:null,accentTxLite:0}); }\n  buildCustomTh(){ const c=this.state.customTh||{}; const base=this.THEMES[c.base]||this.THEMES.noche_azul; const L=(c.lite!=null?+c.lite:0), TL=(c.txLite!=null?+c.txLite:0); const sh=(x,a)=>a?this.shadeHex(x,a):x; const dark=(c.dark!=null?c.dark:base.dark); const bg=sh(c.bg||base.bg,L), panel=sh(c.panel||base.panel,L), tx=sh(c.tx||base.tx,TL); const dir=dark?-1:1; return {...base, dark, bg, bg2:sh(bg,dark?0.05:-0.03), panel, inp:bg, tx, dim:sh(tx,dir*0.16), mute:sh(tx,dir*0.32), faint:sh(tx,dir*0.48), bd:dark?'rgba(255,255,255,0.09)':'rgba(0,0,0,0.10)' }; }\n  setCustomTh(k,v){ const cth={...(this.state.customTh||{}),[k]:v}; this.save2('finz_customth_v1',cth); this.setState({customTh:cth}); }\n  pickCustom(){ let cth=this.state.customTh; if(!cth){ const b=this.state.theme!=='custom'&&this.THEMES[this.state.theme]?this.state.theme:'noche_azul'; cth={base:b}; this.save2('finz_customth_v1',cth); this.setState({customTh:cth}); } this.setTheme('custom'); }\n  setAccent(color){ this.save('finz_accent_v1',color); this.setState({accent:color,colorPick:null}); }\n  clearAccent(){ this.save('finz_accent_v1','#0ea5e9'); this.save('finz_accentlite_v1',0.2); this.save('finz_accentgrad_v1',0.4); this.save('finz_accenttx_v1','#64748b'); this.save('finz_accenttxlite_v1',-0.2); this.setState({accent:'#0ea5e9',accentLite:0.2,accentGrad:0.4,accentTx:'#64748b',accentTxLite:-0.2,colorPick:null}); }\n  setAccentLite(v){ this.save('finz_accentlite_v1',+v); this.setState({accentLite:+v}); }\n  setAccentGrad(v){ this.save('finz_accentgrad_v1',+v); this.setState({accentGrad:+v}); }\n  setAccentTx(color){ this.save('finz_accenttx_v1',color); this.setState({accentTx:color,colorPick:null}); }\n  setAccentTxLite(v){ this.save('finz_accenttxlite_v1',+v); this.setState({accentTxLite:+v}); }\n  setFilter(f){ this.setState({filter:f}); }\n  ff(k,v){ this.setState({ form:{...this.state.form,[k]:v} }); }\n  setKind(kind){ const f=this.state.form; let cat=f.cat,ci=f.ci; if(kind!=='transfer'){ cat=this.cfg()[kind==='income'?'income':'expense'][0].id; ci=0; } t
